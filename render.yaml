databases: []

services:
  - type: web
    runtime: ruby
    name: tasktracker
    plan: free
    buildCommand: |
      bundle install
      bundle exec rails db:migrate
      bundle exec rails db:seed
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
