name: Sanity bootstrap

# One-shot workflow that:
#   1. Imports the existing hardcoded posts and books into Sanity
#   2. Deploys the Sanity Studio to https://domus-aurea.sanity.studio
#
# Trigger manually from the Actions tab. Requires the repo secret
# SANITY_AUTH_TOKEN (an Editor-permission API token from Sanity Manage).

on:
  workflow_dispatch:
    inputs:
      studio_host:
        description: "Sanity studio hostname (without .sanity.studio)"
        required: true
        default: "domus-aurea"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Print Sanity CLI version
        run: npx sanity --version

      - name: Check if studio hostname is available
        run: |
          echo "Checking availability of '${{ inputs.studio_host }}'..."
          npx sanity hostname-availability "${{ inputs.studio_host }}" || true

      - name: Import seed content into Sanity
        run: node scripts/migrate-to-sanity.mjs

      - name: Build studio bundle
        run: npx sanity build --yes

      - name: Deploy studio bundle
        # The Sanity CLI exits 0 even when the deploy fails (e.g. missing
        # grant). Capture output, check for known failure markers, exit
        # non-zero ourselves so the step turns red.
        run: |
          set -o pipefail
          npx sanity deploy "${{ inputs.studio_host }}" --no-build 2>&1 | tee deploy.log
          if grep -E "(× |Forbidden|missing required grant|failed)" deploy.log; then
            echo ""
            echo "::error::sanity deploy reported failure markers in output (see above)."
            exit 1
          fi

      - name: Confirm studio is reachable
        run: |
          URL="https://${{ inputs.studio_host }}.sanity.studio"
          echo "Checking $URL ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "::notice::Studio live at $URL"
          else
            echo "::error::Studio not reachable (HTTP $STATUS) at $URL"
            exit 1
          fi
