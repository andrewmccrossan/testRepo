name: Deploy Sanity Studio

# Re-deploys the Sanity Studio bundle to https://domus-aurea.sanity.studio.
# Trigger manually from the Actions tab whenever you change the schemas
# in sanity/schemas/ or want to push studio config changes live.
#
# Requires the repo secret SANITY_AUTH_TOKEN — a Sanity API token with
# at least the "Deploy Studio" grant. Day-to-day content editing in the
# Studio does not need this; only the deploy step does.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build studio bundle
        run: npx sanity build --yes

      - name: Deploy studio bundle
        # The Sanity CLI exits 0 even when the deploy fails (e.g. missing
        # grant). Capture output, grep for failure markers, exit non-zero
        # ourselves so the step turns red.
        run: |
          set -o pipefail
          npx sanity deploy --no-build 2>&1 | tee deploy.log
          if grep -E "(× |Forbidden|missing required grant|^Error:|failed:)" deploy.log; then
            echo ""
            echo "::error::sanity deploy reported failure markers in output (see above)."
            exit 1
          fi

      - name: Confirm studio is reachable
        # An unauthenticated request returns 302 (redirect to OAuth login).
        # Accept any 2xx or 3xx as proof the studio is registered.
        run: |
          URL="https://domus-aurea.sanity.studio"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "$URL -> HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "::notice::Studio live at $URL"
          else
            echo "::error::Studio not reachable (HTTP $STATUS) at $URL"
            exit 1
          fi
